<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostera - Sign Up</title>
    <link rel="icon" type="image/png" href="../images/Logo.png">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <!-- ===== NAVIGATION BAR ===== -->
<nav class="navbar">
    
    <div class="brand">
    <img src="../images/Logo.png" alt="Hostera logo">
    <span style="font-size: 28px;">HOSTERA</span>
</div>

     <!-- Links -->
    <ul class="nav-links">
        <li><a href="../index.html"><strong>Home</strong></a></li>
        <li><a href="listings.html"><strong>Listings</strong></a></li>
        <li><a href="property.html"><strong>Property</strong></a></li>
        <li><a href="login.html"><strong>Log In</strong></a></li>
    </ul>

    <!-- Right side: theme toggle + button -->
    <div class="right-side">

        <!-- Dark/Light mode switch -->
        <label class="theme-switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>

         <!-- Call-to-action button -->
        <button class="nav-btn">Contact</button>
    </div>
</nav>
<!-- ===== END OF NAVIGATION BAR ===== -->

<!-- ===== CREATING SIGN UP BOX ===== -->
<div class="login-container">
    <div class="login-card">
        <h2>Create Your Account</h2>
        <p>Join the Hostera family</p>
        <form class="login-form">
            
            <!-- ===== FIRST NAME ===== -->
            <label for="Fname">First Name</label>
            <input type="text" id="Fname" class="input" placeholder="Enter first name" oninput="formatName(this)">
            
            <!-- ===== LAST NAME ===== -->
            <label for="Lname">Last Name</label>
            <input type="text" id="Fname" class="input" placeholder="Enter last name" oninput="formatName(this)">
            
            <!-- ===== USERNAME ===== -->
             
             <label for="username">Username</label>
             <input type="text" id="username" class="input"  placeholder="Enter username">
             <p id="username-message"></p>
            
             <!-- ===== EMAIL ===== -->
              <label for="email">Email</label>
              <input type="email" id="email" class="input" placeholder="Enter email">
              <p id="email-message"></p>

             <!-- ===== PASSWORD =====-->
              <label for="password">Password</label>
             <div class="password-container">
    <input type="password" id="password" class="input" placeholder="Create password" onblur="validatePassword()">
    <span class="toggle-password" onclick="showPassword()">👁</span>
           </div> 
           <p id="password-message"></p>
           
           <!-- ===== CONFIRM PASSWORD ===== -->
             <label for="confirmpass">Confirm Password</label>
             <div class="password-container">
    <input type="password" id="confirmpass" class="input" placeholder="Confirm password" onblur="checkConfirmPassword()">
    <span class="toggle-password" onclick="showConfirmPassword()">👁</span>
           </div> 
           <p id="confirm-password-message"></p>
          
           <!-- ===== SIGN UP BUTTON ===== -->
            <button type="submit" class="login-btn">Sign Up</button>
        </form>

        <!-- ===== OPTION TO GO BACK TO LOG IN ===== -->
        <div class="signup-text">
            Already have an account?
            <a href="login.html">Log in</a>

        </div>
    </div>
</div>

<!-- ===== ENABLING THE SWITCH FROM LIGHT TO DARK MODE ===== -->
 <script src="../script/main.js"></script>
</body>
</html>
