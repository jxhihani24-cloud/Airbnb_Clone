<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostera - Account</title>

<link rel="icon" type="image/png" href="../images/Logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/navbar.css">
<link rel="stylesheet" href="../css/login.css">
<link rel="stylesheet" href="../css/account.css">
</head>

<body>

<nav class="navbar">
    <div class="brand">
        <img src="../images/Logo.png" alt="Hostera logo">
        <span style="font-size:28px;">HOSTERA</span>
    </div>

    <ul class="nav-links">
        <li><a href="../index.html"><strong>Home</strong></a></li>
        <li><a href="listings.html"><strong>Listings</strong></a></li>
        <li><a href="property.html"><strong>Property</strong></a></li>
        <li><a href="login.html"><strong>Log In</strong></a></li>
    </ul>

    <div class="right-side">
        <label class="theme-switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>

        <button class="nav-btn">Contact</button>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8 col-xl-6">
            <div class="account-card shadow-sm">
                <div class="text-center mb-4">
                    <h2 class="mb-2">My Account</h2>
                    <p class="mb-0" style="color: var(--text-color); opacity: 0.75;">
                        Manage your personal information
                    </p>
                </div>

                <div id="accountDetails" class="row g-3"></div>

                <div class="d-grid mt-4">
                    <button id="deleteAccountBtn" class="btn delete-account-btn">
                        Delete Account
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../script/main.js"></script>
<script src="../script/account.js"></script>

<footer class="footer">
    <p style="font-weight: bold;color: white;">© 2026 HOSTERA. All rights reserved.</p>

    <div class="social">
        <a href="#"><img src="https://img.icons8.com/color/24/000000/facebook.png"/></a>
        <a href="#"><img src="./images/tiktok.png"></a>
        <a href="#"><img src="https://img.icons8.com/color/24/000000/instagram-new.png"/></a>
    </div>
</footer>

<div id="contactModal" class="modal">
    <div class="contact-modal-content">
        <span class="contact-close">&times;</span>

        <h2>Contact Support</h2>

        <div class="support-section">
            <h3>For Hosts</h3>
            <p>📞 +1 800 123 456</p>
            <p>📧 hosts@hostera.com</p>
        </div>

        <div class="support-section">
            <h3>For Guests</h3>
            <p>📞 +1 800 987 654</p>
            <p>📧 support@hostera.com</p>
        </div>

        <div class="support-section">
            <h3>General</h3>
            <p>📧 info@hostera.com</p>
        </div>
    </div>
</div>

</body>
</html>
