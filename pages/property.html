<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostera - Property</title>
    <link rel="icon" type="image/png" href="../images/Logo.png">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/cards.css">
</head>
<body> 
<!-- ===== NAVBAR START ===== -->
<nav class="navbar">
    
    <div class="brand">
    <img src="../images/Logo.png" alt="Hostera logo">
    <span style="font-size: 28px;">HOSTERA</span>
</div>

    <!-- Navigation links -->
    <ul class="nav-links">
        <li><a href="../index.html"><strong>Home</strong></a></li>
        <li><a href="listings.html"><strong>Listings</strong></a></li>
        <li><a href="property.html"><strong>Property</strong></a></li>
        <li><a href="login.html"><strong>Log In</strong></a></li>
    </ul>

    <!-- Right side: theme toggle + button -->
    <div class="right-side">

        <!-- Dark/Light mode switch -->
        <label class="theme-switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>

            
        <button class="nav-btn">Contact</button>
    </div>
</nav>

<h2 style="text-align:center;">My Properties</h2>
<div id="myProperties" class="listings-grid"></div>


<!-- FLOAT BUTTON -->
<button class="fab" onclick="toggleModal()" style="background-color: var(--button-color);">+</button>

<!-- POPUP -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="toggleModal()">x</span>

    <h2 style="color:var(--text-color)">Add Property</h2>

    <input type="text" id="title" placeholder="Name">
    <input type="text" id="city" placeholder="City">
    <input type="number" id="price" placeholder="Price">
    <input type="text" id="images" placeholder="Image URLs (comma separated)">
    <button onclick="postProperty()" style="background-color: var(--button-color);">Post</button>
  </div>
</div>

<!-- ===== ENABLING THE SWITCH FROM LIGHT TO DARK MODE ===== -->
<script src="../script/main.js"></script>
<script src="../script/property.js"></script>
</body>
</html>
