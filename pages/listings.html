<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostera - Listings</title>
    <link rel="icon" href="../images/Logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/cards.css">
    
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
    <div class="brand">
        <img src="../images/Logo.png" alt="Hostera logo">
        <span style="font-size:28px;">HOSTERA</span>
    </div>

    <ul class="nav-links">
        <li><a href="../index.html"><strong>Home</strong></a></li>
        <li><a href="listings.html"><strong>Listings</strong></a></li>
        <li><a href="property.html"><strong>Property</strong></a></li>
        <li><a href="login.html"><strong>Log In</strong></a></li>
    </ul>

    <div class="right-side">
        <label class="theme-switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>
        <button class="nav-btn">Contact</button>
    </div>
</nav>

<!-- ===== FILTERS ===== -->

<div class="container my-4">
  <div class="row g-2 justify-content-center">

    <div class="col-md-3">
      <input type="text" id="searchCity" class="form-control" placeholder="Search by city" style="border-color: black;">
    </div>

    <div class="col-md-2">
      <input type="number" id="maxPrice" class="form-control" placeholder="Max price (€)" style="border-color: black;">
    </div>

    <div class="col-md-3">
      <select id="countryFilter" class="form-select" style="border-color: black;">
        <option value="">All Countries</option>
        <option value="france">France</option>
        <option value="usa">USA</option>
        <option value="japan">Japan</option>
        <option value="indonesia">Indonesia</option>
        <option value="switzerland">Switzerland</option>
      </select>
    </div>

    <div class="col-md-2">
      <button id="applyFilters" class="btn btn-primary w-100" style="background-color: var(--button-color);color:white;font-weight: bold;border-color: var(--border-color);">
        Apply Filters
      </button>
    </div>

  </div>
</div>

<h2 style="text-align:center;">Available Properties</h2>

<!-- ===== LISTINGS GRID ===== -->
<div class="listings-grid"></div>

<!-- ===== SCRIPTS ===== -->
<script src="../script/listings.js"></script>
<script src="../script/main.js"></script>

<!-- FOOTER -->
<footer class="footer">
    <p style="font-weight: bold;color: white;">© 2026 HOSTERA. All rights reserved.</p>
   
    <div class="social">
        <a href="#"><img src="https://img.icons8.com/color/24/000000/facebook.png"/></a>
        <a href="#"><img src="../images/tiktok.png"></a>
        <a href="#"><img src="https://img.icons8.com/color/24/000000/instagram-new.png"/></a>
    </div>
</footer>
</body>
</html>
