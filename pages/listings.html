<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostera - Available Properties</title>
    <link rel="icon" type="image/png" href="../images/Logo.png">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/cards.css">
</head>
<body>
<!-- ===== NAVBAR START ===== -->
<nav class="navbar">
    <!-- Logo + Brand name -->
     
    <div class="brand">
    <img src="../images/Logo.png" alt="Hostera logo">
    <span style="font-size: 28px;">HOSTERA</span>
</div>

    <!-- Navigation links -->
    <ul class="nav-links">
        <li><a href="../index.html"><strong>Home</strong></a></li>
        <li><a href="listings.html"><strong>Listings</strong></a></li>
        <li><a href="property.html"><strong>Property</strong></a></li>
        <li><a href="login.html"><strong>Log In</strong></a></li>
    </ul>

    <!-- Right side: theme toggle + button -->
    <div class="right-side">

        <!-- Dark/Light mode switch -->
        <label class="theme-switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>

        <!-- Call-to-action button -->
        <button class="nav-btn">Contact</button>
    </div>
</nav>


<div class="listings-container">

    <!-- Filters -->
    <div class="filters">
    <input type="text" id="searchCity" placeholder="Search location...">
    <input type="number" id="maxPrice" placeholder="Max price">
</div>

<h2 style="text-align:center; margin-top:40px;">Available Properties</h2>
<div class="listings-grid"></div>

<script src="../script/listings.js"></script>

<!-- ===== ENABLING THE SWITCH FROM LIGHT TO DARK MODE ===== -->
<script src="../script/main.js"></script>


<script src="../script/listings.js"></script>
