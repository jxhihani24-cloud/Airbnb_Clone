<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostera - Listings</title>
    <link rel="icon" href="../images/Logo.png">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/cards.css">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
    <div class="brand">
        <img src="../images/Logo.png" alt="Hostera logo">
        <span style="font-size:28px;">HOSTERA</span>
    </div>

    <ul class="nav-links">
        <li><a href="../index.html"><strong>Home</strong></a></li>
        <li><a href="listings.html"><strong>Listings</strong></a></li>
        <li><a href="property.html"><strong>Property</strong></a></li>
        <li><a href="login.html"><strong>Log In</strong></a></li>
    </ul>

    <div class="right-side">
        <label class="theme-switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>
        <button class="nav-btn">Contact</button>
    </div>
</nav>

<!-- ===== FILTERS ===== -->
<div class="filters" style="text-align:center; margin:30px 0; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
    <input type="text" id="searchCity" placeholder="Search by city..." />
    <input type="number" id="maxPrice" placeholder="Max price (€)" />
    <select id="countryFilter">
        <option value="">All Countries</option>
        <option value="france">France</option>
        <option value="usa">USA</option>
        <option value="japan">Japan</option>
        <option value="indonesia">Indonesia</option>
        <option value="switzerland">Switzerland</option>
    </select>
    <button id="applyFilters">Apply Filters</button>
</div>

<h2 style="text-align:center;">Available Properties</h2>

<!-- ===== LISTINGS GRID ===== -->
<div class="listings-grid"></div>

<!-- ===== SCRIPTS ===== -->
<script src="../script/listings.js"></script>
<script src="../script/main.js"></script>
</body>
</html>
