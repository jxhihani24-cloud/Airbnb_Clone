<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostera - Log In</title>
    <link rel="icon" type="image/png" href="../images/Logo.png">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/login.css"> 
    
</head>
<body>

<!-- ===== NAVIGATION BAR ===== -->
<nav class="navbar">
    
    <div class="brand">
    <img src="../images/Logo.png" alt="Hostera logo">
    <span style="font-size: 28px;">HOSTERA</span>
</div>

     <!-- Links -->
    <ul class="nav-links">
        <li><a href="../index.html"><strong>Home</strong></a></li>
        <li><a href="listings.html"><strong>Listings</strong></a></li>
        <li><a href="property.html"><strong>Property</strong></a></li>
        <li><a href="login.html"><strong>Log In</strong></a></li>
    </ul>

    <!-- Right side: theme toggle + button -->
    <div class="right-side">

        <!-- Dark/Light mode switch -->
        <label class="theme-switch">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
        </label>

         <!-- Call-to-action button -->
        <button class="nav-btn">Contact</button>
    </div>
</nav>
<!-- ===== END OF NAVIGATION BAR ===== -->

<!-- ===== CREATING THE LOG IN BOX ===== -->
<div class="login-container">
    <div class="login-card"> 
        <h2>Welcome</h2>
        <p>Log in to your Hostera account</p>

        <form class="login-form">

            <!-- ===== USERNAME AND PASSWORD LABELS AND INPUTS,SUBMIT BUTTON AND SIGN UP LINK ===== -->
            <label for="username">Username</label>
            <input type="text" id="username" class="input" placeholder="Enter your username">

            <label for="password">Password</label>
            <div class="password-container">
    <input type="password" id="password" class="input" placeholder="Enter your password">
    <span class="toggle-password" onclick="showPassword()">👁</span>
           </div>

            <button type="submit" class="login-btn">Log In</button>
        </form>

        <div class="signup-text">
            Don't have an account?
            <a href="signup.html">Sign up</a>
        </div>
    </div>
</div>

<!-- ===== ENABLING THE SWITCH FROM LIGHT TO DARK MODE ===== -->
<script src="../script/main.js"></script>
<script src="../script/singup.js"></script> <!-- MAKING SURE EYE BUTTON SHOWS PASSWORD-->
</body>
</html>
